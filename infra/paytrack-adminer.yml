services:
    paytrack-adminer:
        image: adminer
        container_name: paytrack-adminer
        restart: unless-stopped
        init: true
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "wget -qO- http://localhost:8080/ > /dev/null || exit 1",
                ]
            interval: 10s
            timeout: 5s
            retries: 5
        ports:
            - 4102:8080
        environment:
            ADMINER_DEFAULT_SERVER: paytrack-postgres
            ADMINER_DESIGN: pepa-linha-dark
        networks:
            - paytrack-net
        depends_on:
            paytrack-postgres:
                condition: service_healthy
